version: '3.8'
services:
  eagler-server:
    build: .
    container_name: eagler-server
    restart: unless-stopped
    ports:
      - "25565:25565"
      - "25566:25566"
      - "25567:25567"
    volumes:
      - ./server:/app/server
      - ./limbo:/app/limbo
      - ./velocity:/app/velocity
      - ./world:/app/server/world
    healthcheck:
      test: ["CMD-SHELL","ss -ltn | grep -q 25565 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
