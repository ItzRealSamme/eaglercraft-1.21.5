# ================================
# UltimateDuels - Lobby Configuration
# ================================

lobby:
  # Enable the custom lobby system
  enabled: true
  
  # Lobby world name
  world: world
  
  # Lobby spawn point (set in-game with /duels setlobby)
  spawn: world;145.621;109.000;-377.603;179.53;1.55
  
  # Protection settings
  protection:
    # Allow PvP in lobby
    pvp: false
    # Allow hunger depletion
    hunger: false
    # Allow fall damage
    fall-damage: false
    # Allow block breaking
    block-break: false
    # Allow block placing
    block-place: false
    # Allow item dropping
    item-drop: false
    # Allow item pickup
    item-pickup: false
  
  # Weather settings
  weather:
    enabled: false
  
  # Time settings (in ticks, 0-24000)
  # 0 = sunrise, 6000 = noon, 12000 = sunset, 18000 = midnight
  time: 6000
  
  # Effects applied to players in lobby
  # Format: effect_name:amplifier:duration (duration in ticks, -1 for infinite)
  effects:
  - speed:0:-1
  - night_vision:0:-1

