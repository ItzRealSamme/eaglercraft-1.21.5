general:
  prefix: "&8[&6UltimateDuels&8] "
  # Messages de connexion/déconnexion (diffusés à tous les joueurs)
  join-broadcast: "&e{player} &7a rejoint le jeu !"
  quit-broadcast: "&e{player} &7a quitté le jeu."

  # Messages de bienvenue (affichés au joueur qui se connecte)
  welcome-back: "&7Bon retour, &e{player}&7 !"
  welcome-stats: "&7Tes Stats : &a{wins} Victoires &7| &c{losses} Défaites &7| &6{elo} Elo"
  welcome-new: "&7Bienvenue, &e{player}&7 !"
  welcome-hint: "&7Utilise les objets dans ta barre d'action pour commencer."

  no-permission: "{prefix}&cTu n'as pas la permission de faire ça !"
  player-only: "{prefix}&cCette commande ne peut être utilisée que par des joueurs !"
  console-only: "{prefix}&cCette commande ne peut être utilisée que depuis la console !"
  player-not-found: "{prefix}&cLe joueur &e{player} &cn'a pas été trouvé !"
  player-offline: "{prefix}&cLe joueur &e{player} &cn'est pas en ligne !"
  player-not-in-lobby: "{prefix}&cTu dois être dans le lobby pour faire ça !"
  player-busy: "{prefix}&c{player} est actuellement occupé !"
  invalid-number: "{prefix}&c'{input}' n'est pas un nombre valide !"
  invalid-argument: "{prefix}&cArgument invalide ! Utilisation : &e{usage}"
  reload-start: "{prefix}&7Rechargement de la configuration..."
  reload-complete: "{prefix}&aConfiguration rechargée avec succès !"
  reload-failed: "{prefix}&cÉchec du rechargement de la configuration ! Vérifiez la console."
  plugin-disabled: "{prefix}&cCette fonctionnalité est actuellement désactivée !"
  cooldown: "{prefix}&cVeuillez attendre &e{time} &cavant de refaire ça !"
  database-error: "{prefix}&cUne erreur de base de données s'est produite. Veuillez réessayer plus tard."
  join-message: "{prefix}&aBienvenue sur &6Ultimate Duels&a ! Tape &e/duel &apour commencer."
  quit-message: "&e{player} &7a quitté le serveur."
  staff-notification: "&8[&6Staff&8] &7{message}"
  player-in-duel: "{prefix}&cTu ne peux pas utiliser cette commande pendant un duel !"
  player-in-ffa: "{prefix}&cTu ne peux pas utiliser cette commande pendant une arène FFA !"
  player-spectating: "{prefix}&cTu ne peux pas utiliser cette commande en mode spectateur !"
  language-menu-title: "&6&l▬▬▬▬▬▬ MENU LANGUE ▬▬▬▬▬▬"
  language-menu-current: "&7Langue actuelle : &a{language}"
  language-menu-available: "&eLangues disponibles :"
  language-menu-click: "&eClique pour sélectionner"
  language-changed: "{prefix}&aLangue changée en &e{language}&a !"
  language-already-selected: "{prefix}&cTu utilises déjà &e{language}&c !"
  language-not-available: "{prefix}&cLa langue &e{language} &cn'est pas disponible !"
  language-reload-success: "{prefix}&aLangues rechargées avec succès !"

# ██████╗ ██╗   ██╗███████╗██╗
# ██╔══██╗██║   ██║██╔════╝██║
# ██║  ██║██║   ██║█████╗  ██║
# ██║  ██║██║   ██║██╔══╝  ██║
# ██████╔╝╚██████╔╝███████╗███████╗
# ╚═════╝  ╚═════╝ ╚══════╝╚══════╝

duel:
  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES D'ERREUR
  # ════════════════════════════════════════════════════════════════════════════
  cannot-duel-self: "{prefix}&cTu ne peux pas te défier toi-même !"
  already-in-match: "{prefix}&cTu es déjà dans un match !"
  target-in-match: "{prefix}&c{player} est déjà dans un match !"
  sender-in-queue: "{prefix}&cTu es dans une file d'attente ! Quitte d'abord avec /leavequeue"
  target-in-queue: "{prefix}&c{player} est dans une file d'attente !"
  kit-not-found: "{prefix}&cLe kit &e{kit} &cn'existe pas !"
  arena-not-found: "{prefix}&cL'arène &e{arena} &cn'existe pas !"
  no-available-arenas: "{prefix}&cAucune arène n'est actuellement disponible !"

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE DEMANDE DE DUEL
  # ════════════════════════════════════════════════════════════════════════════
  request:
    # Messages affichés à l'expéditeur quand la demande est envoyée
    sent-header: "&a&lDEMANDE DE DUEL ENVOYÉE !"
    sent-target: "&7Cible : &e{target}"
    sent-kit: "&7Kit : &e{kit}"
    sent-arena: "&7Arène : &e{arena}"
    sent-rounds: "&7Manches : &e{rounds}"
    sent-waiting: "&7En attente de réponse..."
    sent-success: "&aDemande de duel envoyée à &e{target}&a !"

    # Messages affichés au destinataire quand il reçoit une demande
    received-header: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
    received-title: "&e&lDEMANDE DE DUEL !"
    received-from: "&7De : &a{sender}"
    received-kit: "&7Kit : &e{kit}"
    received-arena: "&7Arène : &e{arena}"
    received-rounds: "&7Manches : &e{rounds}"
    received-accept: "&a/accept &7- Accepter le duel"
    received-deny: "&c/deny &7- Refuser le duel"
    received-footer: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

    # Messages au survol pour texte cliquable
    received-hover-accept: "&aClique pour accepter le duel !"
    received-hover-deny: "&cClique pour refuser le duel !"

    # Expiration de la demande
    expired-sender: "{prefix}&cTa demande de duel à &e{target} &ca expiré."
    expired-receiver: "{prefix}&cLa demande de duel de &e{player} &ca expiré."

    # Annulation de la demande
    cancelled: "{prefix}&cTu as annulé ta demande de duel à &e{target}&c."
    cancelled-receiver: "{prefix}&c{player} &ca annulé sa demande de duel."

    # Demandes en double
    already-sent: "{prefix}&cTu as déjà une demande de duel en attente pour &e{target}&c !"
    already-pending: "{prefix}&cTu as déjà une demande de duel en attente !"

    # Erreurs de validation de demande
    self-duel: "{prefix}&cTu ne peux pas te défier toi-même !"
    disabled-target: "{prefix}&c{target} a désactivé les demandes de duel !"
    in-duel: "{prefix}&cTu es déjà dans un duel !"
    target-in-duel: "{prefix}&c{target} est déjà dans un duel !"
    in-queue: "{prefix}&cTu es actuellement dans une file d'attente ! Quitte d'abord."
    target-in-queue: "{prefix}&c{target} est actuellement dans une file d'attente !"
    no-pending: "{prefix}&cTu n'as pas de demande de duel en attente de &e{player}&c !"

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES D'ACCEPTATION
  # ════════════════════════════════════════════════════════════════════════════
  accept:
    no-request: "{prefix}&cTu n'as pas de demande de duel en attente !"
    expired: "{prefix}&cCette demande de duel a expiré !"
    sender-offline: "{prefix}&cLe joueur qui a envoyé la demande n'est plus en ligne !"
    already-in-match: "{prefix}&cL'un des joueurs est déjà dans un match !"
    no-arenas: "{prefix}&cAucune arène n'est actuellement disponible ! Réessaye plus tard."
    accepted-you: "&aTu as accepté la demande de duel de &e{sender}&a !"
    accepted-them: "&a{target} &aa accepté ta demande de duel !"
    success: "&aDuel accepté !"

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE REFUS
  # ════════════════════════════════════════════════════════════════════════════
  deny:
    no-request: "{prefix}&cTu n'as pas de demande de duel en attente !"
    denied-you: "&cTu as refusé la demande de duel."
    denied-them: "&c{player} a refusé ta demande de duel."

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE COMPTE À REBOURS
  # ════════════════════════════════════════════════════════════════════════════
  countdown:
    title: "&c{seconds}"
    subtitle: "&7Prépare-toi à combattre !"
    fight-title: "&a&lCOMBAT !"
    fight-subtitle: "&7Bonne chance !"
    starting: "{prefix}&7Le duel commence dans &e{seconds} &7secondes..."

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE MANCHE (Duels multi-manches)
  # ════════════════════════════════════════════════════════════════════════════
  round:
    start: "{prefix}&6La Manche &e{round}&6/&e{max_rounds} &6a commencé !"
    end: "{prefix}&e{winner} &6a gagné la Manche &e{round}&6 !"
    won: "&a&lMANCHE GAGNÉE ! &7Score : &e{score}"
    lost: "&c&lMANCHE PERDUE ! &7Score : &e{score}"
    starting: "&e&lManche {round} en cours de démarrage..."
    preparing: "&e&lPréparation de la Manche {round}..."
    fight: "&a&lCOMBAT !"
    player-died: "&c{player} &7a été tué par &a{killer}&7 !"
    reset: "{prefix}&7Réinitialisation pour la prochaine manche..."

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE RÉGÉNÉRATION D'ARÈNE
  # ════════════════════════════════════════════════════════════════════════════
  arena:
    regenerating: "&e&lPréparation de l'arène pour la prochaine manche..."
    ready: "&a&lArène prête ! Démarrage de la manche {round}..."
    regen-failed: "&e&lRégénération de l'arène ignorée - poursuite du match..."
    restoring: "&7Restauration de l'arène &e{arena}&7..."
    restored: "&aL'arène &e{arena} &aa été restaurée !"

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE FIN DE MATCH
  # ════════════════════════════════════════════════════════════════════════════
  match:
    victory-title: "&a&lVICTOIRE !"
    victory-subtitle: "&7Tu as gagné le duel !"
    defeat-title: "&c&lDÉFAITE"
    defeat-subtitle: "&7Meilleure chance la prochaine fois !"
    draw-title: "&e&lÉGALITÉ"
    draw-subtitle: "&7C'est une égalité !"

    # Message de diffusion
    winner-broadcast: "&6{winner} &ea vaincu &6{loser} &een duel ! &7(&b{kit}&7)"

    # Écran de statistiques de match
    statistics:
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - "&e&lRÉSULTATS DU DUEL"
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""
      - "&7Gagnant : &a{winner}"
      - "&7Perdant : &c{loser}"
      - "&7Score Final : &e{score}"
      - ""
      - "&7Kit : &b{kit}"
      - "&7Arène : &d{arena}"
      - "&7Durée : &f{duration}"
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES D'ABANDON
  # ════════════════════════════════════════════════════════════════════════════
  forfeit:
    self: "{prefix}&cTu as abandonné le duel !"
    opponent: "{prefix}&e{player} &ca abandonné le duel ! Tu gagnes !"
    broadcast: "&e{player} &ca abandonné son duel contre &e{opponent}&c !"

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE DÉCONNEXION
  # ════════════════════════════════════════════════════════════════════════════
  disconnect:
    self: "{prefix}&cTu as été déconnecté du duel."
    opponent: "{prefix}&e{player} &cs'est déconnecté ! Tu gagnes !"
    broadcast: "&e{player} &cs'est déconnecté de son duel !"

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES SPECTATEUR
  # ════════════════════════════════════════════════════════════════════════════
  spectator:
    round-ended: "&7Manche {round}/{total} terminée ! Score : &e{score}"
    round-starting: "&7Manche {round} en cours de démarrage..."
    match-over: "&a&lMATCH TERMINÉ ! &7Gagnant : &e{winner}"
    match-cancelled: "&cLe match a été annulé."

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE TÉLÉPORTATION
  # ════════════════════════════════════════════════════════════════════════════
  teleport:
    teleporting: "&7Téléportation vers l'arène..."
    teleported: "&aTéléporté vers l'arène &e{arena}&a !"
    failed: "&cÉchec de la téléportation vers l'arène !"

  # ════════════════════════════════════════════════════════════════════════════
  # MESSAGES DE RÉCUPÉRATION D'ERREUR
  # ════════════════════════════════════════════════════════════════════════════
  error:
    match-cancelled: "{prefix}&cLe match a été annulé : &e{reason}"
    kit-load-failed: "{prefix}&cÉchec du chargement du kit !"
    arena-load-failed: "{prefix}&cÉchec du chargement de l'arène !"
    unexpected-error: "{prefix}&cUne erreur inattendue s'est produite. Veuillez contacter un administrateur."

# ██████╗ ██╗   ██╗███████╗██╗   ██╗███████╗
