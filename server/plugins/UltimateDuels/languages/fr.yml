ffa:
  joined: "{prefix}&aTu as rejoint &e{arena} &aFFA !"
  left: "{prefix}&cTu as quitté l'arène FFA."
  already-in-ffa: "{prefix}&cTu es déjà dans une arène FFA !"
  killed-by: "&c{player} &7a été tué par &a{killer}&7 !"
  death: "&c{player} &7est mort !"
  arena-full: "{prefix}&cCette arène FFA est pleine !"
  arena-disabled: "{prefix}&cCette arène FFA est actuellement désactivée !"

  created: "{prefix}&aArène FFA &e{arena} &apour le kit &b{kit} &aa été créée !"
