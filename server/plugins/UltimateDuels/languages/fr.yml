queue:
  joined: "{prefix}&aTu as rejoint la file &e{kit}&a !"
  left: "{prefix}&cTu as quitté la file &e{kit}&c."
  already-in-queue: "{prefix}&cTu es déjà dans une file d'attente !"
  not-in-queue: "{prefix}&cTu n'es pas dans une file d'attente !"
  match-found: "{prefix}&a&lMatch trouvé ! &7Téléportation..."
