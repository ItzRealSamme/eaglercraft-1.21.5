    applied: "{prefix}&a¡Kit personalizado &e{kit} &aaplicado!"

  editor:
    opened: "{prefix}&a¡Editor de Kit abierto para &e{kit}&a!"
    closed-saved: "{prefix}&a¡Diseño del kit guardado!"
