ffa:
  joined: "{prefix}&a¡Te has unido a &e{arena} &aFFA!"
  left: "{prefix}&cHas abandonado la arena FFA."
  already-in-ffa: "{prefix}&c¡Ya estás en una arena FFA!"
  killed-by: "&c{player} &7fue eliminado por &a{killer}&7!"
  death: "&c{player} &7murió!"
  arena-full: "{prefix}&c¡Esta arena FFA está llena!"
  arena-disabled: "{prefix}&c¡Esta arena FFA está actualmente deshabilitada!"

  created: "{prefix}&a¡Arena FFA &e{arena} &apara el kit &b{kit} &aha sido creada!"
