general:
  prefix: "&8[&6UltimateDuels&8] "
  # Mensajes de entrada/salida (se muestran a todos los jugadores)
  join-broadcast: "&e{player} &7se ha unido al juego!"
  quit-broadcast: "&e{player} &7ha abandonado el juego."

  # Mensajes de bienvenida (se muestran al jugador que entra)
  welcome-back: "&7¡Bienvenido de nuevo, &e{player}&7!"
  welcome-stats: "&7Tus Estadísticas: &a{wins} Victorias &7| &c{losses} Derrotas &7| &6{elo} Elo"
  welcome-new: "&7¡Bienvenido, &e{player}&7!"
  welcome-hint: "&7Usa los objetos en tu barra de acceso rápido para comenzar."

  no-permission: "{prefix}&c¡No tienes permiso para hacer eso!"
  player-only: "{prefix}&c¡Este comando solo puede ser usado por jugadores!"
  console-only: "{prefix}&c¡Este comando solo puede ser usado desde la consola!"
  player-not-found: "{prefix}&c¡El jugador &e{player} &cno fue encontrado!"
  player-offline: "{prefix}&c¡El jugador &e{player} &cno está conectado!"
  player-not-in-lobby: "{prefix}&c¡Debes estar en el lobby para hacer eso!"
  player-busy: "{prefix}&c¡{player} está ocupado actualmente!"
  invalid-number: "{prefix}&c¡'{input}' no es un número válido!"
  invalid-argument: "{prefix}&c¡Argumento inválido! Uso: &e{usage}"
  reload-start: "{prefix}&7Recargando configuración..."
  reload-complete: "{prefix}&a¡Configuración recargada exitosamente!"
  reload-failed: "{prefix}&c¡Error al recargar la configuración! Revisa la consola."
  plugin-disabled: "{prefix}&c¡Esta función está actualmente deshabilitada!"
  cooldown: "{prefix}&c¡Por favor espera &e{time} &cantes de hacer eso de nuevo!"
  database-error: "{prefix}&cOcurrió un error de base de datos. Por favor intenta más tarde."
  join-message: "{prefix}&a¡Bienvenido a &6Ultimate Duels&a! Escribe &e/duel &apara comenzar."
  quit-message: "&e{player} &7ha abandonado el servidor."
  staff-notification: "&8[&6Staff&8] &7{message}"
  player-in-duel: "{prefix}&c¡No puedes usar este comando mientras estás en un duelo!"
  player-in-ffa: "{prefix}&c¡No puedes usar este comando mientras estás en una arena FFA!"
  player-spectating: "{prefix}&c¡No puedes usar este comando mientras estás espectando!"
  language-menu-title: "&6&l▬▬▬▬▬▬ MENÚ DE IDIOMA ▬▬▬▬▬▬"
  language-menu-current: "&7Idioma Actual: &a{language}"
  language-menu-available: "&eIdiomas Disponibles:"
  language-menu-click: "&eHaz clic para seleccionar"
  language-changed: "{prefix}&a¡Idioma cambiado a &e{language}&a!"
  language-already-selected: "{prefix}&c¡Ya estás usando &e{language}&c!"
  language-not-available: "{prefix}&c¡El idioma &e{language} &cno está disponible!"
  language-reload-success: "{prefix}&a¡Idiomas recargados exitosamente!"

# ██████╗ ██╗   ██╗███████╗██╗
# ██╔══██╗██║   ██║██╔════╝██║
# ██║  ██║██║   ██║█████╗  ██║
# ██║  ██║██║   ██║██╔══╝  ██║
# ██████╔╝╚██████╔╝███████╗███████╗
# ╚═════╝  ╚═════╝ ╚══════╝╚══════╝

duel:
  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE ERROR
  # ════════════════════════════════════════════════════════════════════════════
  cannot-duel-self: "{prefix}&c¡No puedes retarte a ti mismo!"
  already-in-match: "{prefix}&c¡Ya estás en una partida!"
  target-in-match: "{prefix}&c¡{player} ya está en una partida!"
  sender-in-queue: "{prefix}&c¡Estás en una cola! Sal primero con /leavequeue"
  target-in-queue: "{prefix}&c¡{player} está en una cola!"
  kit-not-found: "{prefix}&c¡El kit &e{kit} &cno existe!"
  arena-not-found: "{prefix}&c¡La arena &e{arena} &cno existe!"
  no-available-arenas: "{prefix}&c¡No hay arenas disponibles actualmente!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE SOLICITUD DE DUELO
  # ════════════════════════════════════════════════════════════════════════════
  request:
    # Mensajes mostrados al remitente cuando se envía la solicitud
    sent-header: "&a&l¡SOLICITUD DE DUELO ENVIADA!"
    sent-target: "&7Objetivo: &e{target}"
    sent-kit: "&7Kit: &e{kit}"
    sent-arena: "&7Arena: &e{arena}"
    sent-rounds: "&7Rondas: &e{rounds}"
    sent-waiting: "&7Esperando respuesta..."
    sent-success: "&a¡Solicitud de duelo enviada a &e{target}&a!"

    # Mensajes mostrados al receptor cuando recibe una solicitud
    received-header: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
    received-title: "&e&l¡SOLICITUD DE DUELO!"
    received-from: "&7De: &a{sender}"
    received-kit: "&7Kit: &e{kit}"
    received-arena: "&7Arena: &e{arena}"
    received-rounds: "&7Rondas: &e{rounds}"
    received-accept: "&a/accept &7- Aceptar el duelo"
    received-deny: "&c/deny &7- Rechazar el duelo"
    received-footer: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

    # Mensajes hover para texto clickeable
    received-hover-accept: "&a¡Haz clic para aceptar el duelo!"
    received-hover-deny: "&c¡Haz clic para rechazar el duelo!"

    # Expiración de solicitud
    expired-sender: "{prefix}&cTu solicitud de duelo a &e{target} &cha expirado."
    expired-receiver: "{prefix}&cLa solicitud de duelo de &e{player} &cha expirado."

    # Cancelación de solicitud
    cancelled: "{prefix}&cHas cancelado tu solicitud de duelo a &e{target}&c."
    cancelled-receiver: "{prefix}&c{player} &cha cancelado su solicitud de duelo."

    # Solicitudes duplicadas
    already-sent: "{prefix}&c¡Ya tienes una solicitud de duelo pendiente a &e{target}&c!"
    already-pending: "{prefix}&c¡Ya tienes una solicitud de duelo pendiente!"

    # Errores de validación de solicitud
    self-duel: "{prefix}&c¡No puedes retarte a ti mismo!"
    disabled-target: "{prefix}&c¡{target} ha deshabilitado las solicitudes de duelo!"
    in-duel: "{prefix}&c¡Ya estás en un duelo!"
    target-in-duel: "{prefix}&c¡{target} ya está en un duelo!"
    in-queue: "{prefix}&c¡Actualmente estás en una cola! Sal primero."
    target-in-queue: "{prefix}&c¡{target} está actualmente en una cola!"
    no-pending: "{prefix}&c¡No tienes solicitudes de duelo pendientes de &e{player}&c!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE ACEPTACIÓN
  # ════════════════════════════════════════════════════════════════════════════
  accept:
    no-request: "{prefix}&c¡No tienes solicitudes de duelo pendientes!"
    expired: "{prefix}&c¡Esta solicitud de duelo ha expirado!"
    sender-offline: "{prefix}&c¡El jugador que envió la solicitud ya no está conectado!"
    already-in-match: "{prefix}&c¡Uno de los jugadores ya está en una partida!"
    no-arenas: "{prefix}&c¡No hay arenas disponibles actualmente! Intenta más tarde."
    accepted-you: "&a¡Has aceptado la solicitud de duelo de &e{sender}&a!"
    accepted-them: "&a¡{target} &aha aceptado tu solicitud de duelo!"
    success: "&a¡Duelo aceptado!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE RECHAZO
  # ════════════════════════════════════════════════════════════════════════════
  deny:
    no-request: "{prefix}&c¡No tienes solicitudes de duelo pendientes!"
    denied-you: "&cHas rechazado la solicitud de duelo."
    denied-them: "&c{player} rechazó tu solicitud de duelo."

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE CUENTA REGRESIVA
  # ════════════════════════════════════════════════════════════════════════════
  countdown:
    title: "&c{seconds}"
    subtitle: "&7¡Prepárate para luchar!"
    fight-title: "&a&l¡LUCHA!"
    fight-subtitle: "&7¡Buena suerte!"
    starting: "{prefix}&7El duelo comienza en &e{seconds} &7segundos..."

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE RONDA (Duelos de múltiples rondas)
  # ════════════════════════════════════════════════════════════════════════════
  round:
    start: "{prefix}&6¡La Ronda &e{round}&6/&e{max_rounds} &6ha comenzado!"
    end: "{prefix}&e{winner} &6ganó la Ronda &e{round}&6!"
    won: "&a&l¡RONDA GANADA! &7Puntuación: &e{score}"
    lost: "&c&l¡RONDA PERDIDA! &7Puntuación: &e{score}"
    starting: "&e&lRonda {round} comenzando..."
    preparing: "&e&lPreparando la Ronda {round}..."
    fight: "&a&l¡LUCHA!"
    player-died: "&c{player} &7fue eliminado por &a{killer}&7!"
    reset: "{prefix}&7Reiniciando para la siguiente ronda..."

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE REGENERACIÓN DE ARENA
  # ════════════════════════════════════════════════════════════════════════════
  arena:
    regenerating: "&e&lPreparando arena para la siguiente ronda..."
    ready: "&a&l¡Arena lista! Iniciando ronda {round}..."
    regen-failed: "&e&lRegeneración de arena omitida - continuando partida..."
    restoring: "&7Restaurando arena &e{arena}&7..."
    restored: "&a¡La arena &e{arena} &aha sido restaurada!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE FIN DE PARTIDA
  # ════════════════════════════════════════════════════════════════════════════
  match:
    victory-title: "&a&l¡VICTORIA!"
    victory-subtitle: "&7¡Ganaste el duelo!"
    defeat-title: "&c&lDERROTA"
    defeat-subtitle: "&7¡Mejor suerte la próxima vez!"
    draw-title: "&e&lEMPATE"
    draw-subtitle: "&7¡Es un empate!"

    # Mensaje de anuncio
    winner-broadcast: "&6{winner} &eha derrotado a &6{loser} &een un duelo! &7(&b{kit}&7)"

    # Pantalla de estadísticas de partida
    statistics:
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - "&e&lRESULTADOS DEL DUELO"
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""
      - "&7Ganador: &a{winner}"
      - "&7Perdedor: &c{loser}"
      - "&7Puntuación Final: &e{score}"
      - ""
      - "&7Kit: &b{kit}"
      - "&7Arena: &d{arena}"
      - "&7Duración: &f{duration}"
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE ABANDONO
  # ════════════════════════════════════════════════════════════════════════════
  forfeit:
    self: "{prefix}&c¡Has abandonado el duelo!"
    opponent: "{prefix}&e{player} &cha abandonado el duelo! ¡Tú ganas!"
    broadcast: "&e{player} &cabandonó su duelo contra &e{opponent}&c!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE DESCONEXIÓN
  # ════════════════════════════════════════════════════════════════════════════
  disconnect:
    self: "{prefix}&cTe has desconectado del duelo."
    opponent: "{prefix}&e{player} &cse ha desconectado! ¡Tú ganas!"
    broadcast: "&e{player} &cse desconectó de su duelo!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE ESPECTADOR
  # ════════════════════════════════════════════════════════════════════════════
  spectator:
    round-ended: "&7¡Ronda {round}/{total} terminada! Puntuación: &e{score}"
    round-starting: "&7Ronda {round} comenzando..."
    match-over: "&a&l¡PARTIDA TERMINADA! &7Ganador: &e{winner}"
    match-cancelled: "&cLa partida fue cancelada."

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE TELETRANSPORTACIÓN
  # ════════════════════════════════════════════════════════════════════════════
  teleport:
    teleporting: "&7Teletransportando a la arena..."
    teleported: "&a¡Teletransportado a la arena &e{arena}&a!"
    failed: "&c¡Error al teletransportar a la arena!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAJES DE RECUPERACIÓN DE ERRORES
  # ════════════════════════════════════════════════════════════════════════════
  error:
    match-cancelled: "{prefix}&cLa partida fue cancelada: &e{reason}"
    kit-load-failed: "{prefix}&c¡Error al cargar el kit!"
    arena-load-failed: "{prefix}&c¡Error al cargar la arena!"
    unexpected-error: "{prefix}&cOcurrió un error inesperado. Por favor contacta a un administrador."

