  joined: "{prefix}&a¡Te has unido a la cola de &e{kit}&a!"
  left: "{prefix}&cHas abandonado la cola de &e{kit}&c."
  already-in-queue: "{prefix}&c¡Ya estás en una cola!"
  not-in-queue: "{prefix}&c¡No estás en ninguna cola!"
  match-found: "{prefix}&a&l¡Partida encontrada! &7Teletransportando..."
