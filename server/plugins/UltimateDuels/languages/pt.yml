duel:
  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE ERRO
  # ════════════════════════════════════════════════════════════════════════════
  cannot-duel-self: "{prefix}&cVocê não pode duelar consigo mesmo!"
  already-in-match: "{prefix}&cVocê já está em uma partida!"
  target-in-match: "{prefix}&c{player} já está em uma partida!"
  sender-in-queue: "{prefix}&cVocê está em uma fila! Saia primeiro com /leavequeue"
  target-in-queue: "{prefix}&c{player} está em uma fila!"
  kit-not-found: "{prefix}&cO kit &e{kit} &cnão existe!"
  arena-not-found: "{prefix}&cA arena &e{arena} &cnão existe!"
  no-available-arenas: "{prefix}&cNenhuma arena está disponível no momento!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE SOLICITAÇÃO DE DUELO
  # ════════════════════════════════════════════════════════════════════════════
  request:
    # Mensagens mostradas ao remetente quando a solicitação é enviada
    sent-header: "&a&lSOLICITAÇÃO DE DUELO ENVIADA!"
    sent-target: "&7Alvo: &e{target}"
    sent-kit: "&7Kit: &e{kit}"
    sent-arena: "&7Arena: &e{arena}"
    sent-rounds: "&7Rodadas: &e{rounds}"
    sent-waiting: "&7Aguardando resposta..."
    sent-success: "&aSolicitação de duelo enviada para &e{target}&a!"

    # Mensagens mostradas ao destinatário quando recebe uma solicitação
    received-header: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
    received-title: "&e&lSOLICITAÇÃO DE DUELO!"
    received-from: "&7De: &a{sender}"
    received-kit: "&7Kit: &e{kit}"
    received-arena: "&7Arena: &e{arena}"
    received-rounds: "&7Rodadas: &e{rounds}"
    received-accept: "&a/accept &7- Aceitar o duelo"
    received-deny: "&c/deny &7- Recusar o duelo"
    received-footer: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

    # Mensagens ao passar o mouse para texto clicável
    received-hover-accept: "&aClique para aceitar o duelo!"
    received-hover-deny: "&cClique para recusar o duelo!"

    # Expiração da solicitação
    expired-sender: "{prefix}&cSua solicitação de duelo para &e{target} &cexpirou."
    expired-receiver: "{prefix}&cA solicitação de duelo de &e{player} &cexpirou."

    # Cancelamento da solicitação
    cancelled: "{prefix}&cVocê cancelou sua solicitação de duelo para &e{target}&c."
    cancelled-receiver: "{prefix}&c{player} &ccancelou sua solicitação de duelo."

    # Solicitações duplicadas
    already-sent: "{prefix}&cVocê já tem uma solicitação de duelo pendente para &e{target}&c!"
    already-pending: "{prefix}&cVocê já tem uma solicitação de duelo pendente!"

    # Erros de validação de solicitação
    self-duel: "{prefix}&cVocê não pode duelar consigo mesmo!"
    disabled-target: "{prefix}&c{target} desabilitou as solicitações de duelo!"
    in-duel: "{prefix}&cVocê já está em um duelo!"
    target-in-duel: "{prefix}&c{target} já está em um duelo!"
    in-queue: "{prefix}&cVocê está em uma fila no momento! Saia primeiro."
    target-in-queue: "{prefix}&c{target} está em uma fila no momento!"
    no-pending: "{prefix}&cVocê não tem solicitações de duelo pendentes de &e{player}&c!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE ACEITAÇÃO
  # ════════════════════════════════════════════════════════════════════════════
  accept:
    no-request: "{prefix}&cVocê não tem solicitações de duelo pendentes!"
    expired: "{prefix}&cEsta solicitação de duelo expirou!"
    sender-offline: "{prefix}&cO jogador que enviou a solicitação não está mais online!"
    already-in-match: "{prefix}&cUm dos jogadores já está em uma partida!"
    no-arenas: "{prefix}&cNenhuma arena está disponível no momento! Tente novamente mais tarde."
    accepted-you: "&aVocê aceitou a solicitação de duelo de &e{sender}&a!"
    accepted-them: "&a{target} &aaceitou sua solicitação de duelo!"
    success: "&aDuelo aceito!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE RECUSA
  # ════════════════════════════════════════════════════════════════════════════
  deny:
    no-request: "{prefix}&cVocê não tem solicitações de duelo pendentes!"
    denied-you: "&cVocê recusou a solicitação de duelo."
    denied-them: "&c{player} recusou sua solicitação de duelo."

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE CONTAGEM REGRESSIVA
  # ════════════════════════════════════════════════════════════════════════════
  countdown:
    title: "&c{seconds}"
    subtitle: "&7Prepare-se para lutar!"
    fight-title: "&a&lLUTE!"
    fight-subtitle: "&7Boa sorte!"
    starting: "{prefix}&7O duelo começa em &e{seconds} &7segundos..."

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE RODADA (Duelos de múltiplas rodadas)
  # ════════════════════════════════════════════════════════════════════════════
  round:
    start: "{prefix}&6A Rodada &e{round}&6/&e{max_rounds} &6começou!"
    end: "{prefix}&e{winner} &6venceu a Rodada &e{round}&6!"
    won: "&a&lRODADA VENCIDA! &7Pontuação: &e{score}"
    lost: "&c&lRODADA PERDIDA! &7Pontuação: &e{score}"
    starting: "&e&lRodada {round} iniciando..."
    preparing: "&e&lPreparando a Rodada {round}..."
    fight: "&a&lLUTE!"
    player-died: "&c{player} &7foi eliminado por &a{killer}&7!"
    reset: "{prefix}&7Reiniciando para a próxima rodada..."

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE REGENERAÇÃO DE ARENA
  # ════════════════════════════════════════════════════════════════════════════
  arena:
    regenerating: "&e&lPreparando arena para a próxima rodada..."
    ready: "&a&lArena pronta! Iniciando rodada {round}..."
    regen-failed: "&e&lRegeneração da arena ignorada - continuando partida..."
    restoring: "&7Restaurando arena &e{arena}&7..."
    restored: "&aA arena &e{arena} &afoi restaurada!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE FIM DE PARTIDA
  # ════════════════════════════════════════════════════════════════════════════
  match:
    victory-title: "&a&lVITÓRIA!"
    victory-subtitle: "&7Você venceu o duelo!"
    defeat-title: "&c&lDERROTA"
    defeat-subtitle: "&7Mais sorte na próxima vez!"
    draw-title: "&e&lEMPATE"
    draw-subtitle: "&7É um empate!"

    # Mensagem de transmissão
    winner-broadcast: "&6{winner} &ederrotou &6{loser} &eem um duelo! &7(&b{kit}&7)"

    # Tela de estatísticas da partida
    statistics:
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - "&e&lRESULTADOS DO DUELO"
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""
      - "&7Vencedor: &a{winner}"
      - "&7Perdedor: &c{loser}"
      - "&7Pontuação Final: &e{score}"
      - ""
      - "&7Kit: &b{kit}"
      - "&7Arena: &d{arena}"
      - "&7Duração: &f{duration}"
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE DESISTÊNCIA
  # ════════════════════════════════════════════════════════════════════════════
  forfeit:
    self: "{prefix}&cVocê desistiu do duelo!"
    opponent: "{prefix}&e{player} &cdesistiu do duelo! Você venceu!"
    broadcast: "&e{player} &cdesistiu do seu duelo contra &e{opponent}&c!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE DESCONEXÃO
  # ════════════════════════════════════════════════════════════════════════════
  disconnect:
    self: "{prefix}&cVocê foi desconectado do duelo."
    opponent: "{prefix}&e{player} &cse desconectou! Você venceu!"
    broadcast: "&e{player} &cse desconectou do seu duelo!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE ESPECTADOR
  # ════════════════════════════════════════════════════════════════════════════
  spectator:
    round-ended: "&7Rodada {round}/{total} encerrada! Pontuação: &e{score}"
    round-starting: "&7Rodada {round} iniciando..."
    match-over: "&a&lPARTIDA ENCERRADA! &7Vencedor: &e{winner}"
    match-cancelled: "&cA partida foi cancelada."

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE TELEPORTE
  # ════════════════════════════════════════════════════════════════════════════
  teleport:
    teleporting: "&7Teleportando para a arena..."
    teleported: "&aTeleportado para a arena &e{arena}&a!"
    failed: "&cFalha ao teleportar para a arena!"

  # ════════════════════════════════════════════════════════════════════════════
  # MENSAGENS DE RECUPERAÇÃO DE ERRO
  # ════════════════════════════════════════════════════════════════════════════
  error:
    match-cancelled: "{prefix}&cA partida foi cancelada: &e{reason}"
    kit-load-failed: "{prefix}&cFalha ao carregar o kit!"
    arena-load-failed: "{prefix}&cFalha ao carregar a arena!"
    unexpected-error: "{prefix}&cOcorreu um erro inesperado. Por favor contate um administrador."

