general:
  prefix: "&8[&6UltimateDuels&8] "
  # Mensagens de entrada/saída (transmitidas para todos os jogadores)
  join-broadcast: "&e{player} &7entrou no jogo!"
  quit-broadcast: "&e{player} &7saiu do jogo."

  # Mensagens de boas-vindas (mostradas ao jogador que entra)
  welcome-back: "&7Bem-vindo de volta, &e{player}&7!"
  welcome-stats: "&7Suas Estatísticas: &a{wins} Vitórias &7| &c{losses} Derrotas &7| &6{elo} Elo"
  welcome-new: "&7Bem-vindo, &e{player}&7!"
  welcome-hint: "&7Use os itens na sua hotbar para começar."

  no-permission: "{prefix}&cVocê não tem permissão para fazer isso!"
  player-only: "{prefix}&cEste comando só pode ser usado por jogadores!"
  console-only: "{prefix}&cEste comando só pode ser usado pelo console!"
  player-not-found: "{prefix}&cO jogador &e{player} &cnão foi encontrado!"
  player-offline: "{prefix}&cO jogador &e{player} &cnão está online!"
  player-not-in-lobby: "{prefix}&cVocê precisa estar no lobby para fazer isso!"
  player-busy: "{prefix}&c{player} está ocupado no momento!"
  invalid-number: "{prefix}&c'{input}' não é um número válido!"
  invalid-argument: "{prefix}&cArgumento inválido! Uso: &e{usage}"
  reload-start: "{prefix}&7Recarregando configuração..."
  reload-complete: "{prefix}&aConfiguração recarregada com sucesso!"
  reload-failed: "{prefix}&cFalha ao recarregar a configuração! Verifique o console."
  plugin-disabled: "{prefix}&cEsta funcionalidade está atualmente desabilitada!"
  cooldown: "{prefix}&cPor favor aguarde &e{time} &cantes de fazer isso novamente!"
  database-error: "{prefix}&cOcorreu um erro no banco de dados. Por favor tente novamente mais tarde."
  join-message: "{prefix}&aBem-vindo ao &6Ultimate Duels&a! Digite &e/duel &apara começar."
  quit-message: "&e{player} &7saiu do servidor."
  staff-notification: "&8[&6Staff&8] &7{message}"
  player-in-duel: "{prefix}&cVocê não pode usar este comando durante um duelo!"
  player-in-ffa: "{prefix}&cVocê não pode usar este comando durante uma arena FFA!"
  player-spectating: "{prefix}&cVocê não pode usar este comando enquanto assiste!"
  language-menu-title: "&6&l▬▬▬▬▬▬ MENU DE IDIOMA ▬▬▬▬▬▬"
  language-menu-current: "&7Idioma Atual: &a{language}"
  language-menu-available: "&eIdiomas Disponíveis:"
  language-menu-click: "&eClique para selecionar"
  language-changed: "{prefix}&aIdioma alterado para &e{language}&a!"
  language-already-selected: "{prefix}&cVocê já está usando &e{language}&c!"
  language-not-available: "{prefix}&cO idioma &e{language} &cnão está disponível!"
  language-reload-success: "{prefix}&aIdiomas recarregados com sucesso!"

# ██████╗ ██╗   ██╗███████╗██╗
# ██╔══██╗██║   ██║██╔════╝██║
# ██║  ██║██║   ██║█████╗  ██║
