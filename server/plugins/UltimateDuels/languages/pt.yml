ffa:
  joined: "{prefix}&aVocê entrou em &e{arena} &aFFA!"
  left: "{prefix}&cVocê saiu da arena FFA."
  already-in-ffa: "{prefix}&cVocê já está em uma arena FFA!"
  killed-by: "&c{player} &7foi eliminado por &a{killer}&7!"
  death: "&c{player} &7morreu!"
  arena-full: "{prefix}&cEsta arena FFA está cheia!"
  arena-disabled: "{prefix}&cEsta arena FFA está desabilitada no momento!"

  created: "{prefix}&aArena FFA &e{arena} &apara o kit &b{kit} &afoi criada!"
  deleted: "{prefix}&cA Arena FFA &e{arena} &cfoi deletada!"
  spawn-added: "{prefix}&aPonto de spawn adicionado à arena FFA &e{arena}&a! &7({count} no total)"
  spawn-cleared: "{prefix}&cTodos os pontos de spawn foram limpos para a arena FFA &e{arena}&c!"
