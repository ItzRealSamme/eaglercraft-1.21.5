queue:
  joined: "{prefix}&aYou joined the &e{kit} &aqueue!"
  left: "{prefix}&cYou left the &e{kit} &cqueue."
  already-in-queue: "{prefix}&cYou are already in a queue!"
  not-in-queue: "{prefix}&cYou are not in a queue!"
  match-found: "{prefix}&a&lMatch found! &7Teleporting..."
  queue-full: "{prefix}&cThe queue is currently full. Try again later."
  status:
    - "{prefix}&7Queue Status for &b{kit}&7:"
    - "  &7In Queue: &a{in_queue}"
    - "  &7Fighting: &c{fighting}"

# ██╗  ██╗██╗████████╗███████╗
