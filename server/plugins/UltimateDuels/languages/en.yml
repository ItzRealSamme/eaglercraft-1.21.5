party:
  created: "{prefix}&aParty created! Invite players with &e/party invite <player>&a!"
  disbanded: "{prefix}&cYour party has been disbanded."
  already-in-party: "{prefix}&cYou are already in a party!"
  not-in-party: "{prefix}&cYou are not in a party!"
  not-leader: "{prefix}&cOnly the party leader can do that!"

  invite:
    sent: "{prefix}&aInvite sent to &e{player}&a!"
    received:
      - ""
      - "&d&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""
      - "  &e{player} &7has invited you to their party!"
      - "  &7Members: &f{member_count}/{max_size}"
      - ""
      - "  &a[ACCEPT]              &c[DENY]"
      - ""
      - "&d&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""
    expired: "{prefix}&cThe party invite from &e{player} &chas expired."
    no-pending: "{prefix}&cYou don't have a pending invite from &e{player}&c!"
    already-invited: "{prefix}&c{player} already has a pending invite!"

  joined: "{prefix}&a{player} has joined the party!"
  left: "{prefix}&c{player} has left the party."
  kicked: "{prefix}&c{player} has been kicked from the party."
  you-kicked: "{prefix}&cYou have been kicked from the party!"

  leader-changed: "{prefix}&e{player} is now the party leader!"
