# ═══════════════════════════════════════════════════════════════════════════════
#                        ULTIMATE DUELS - ENGLISH LANGUAGE
#                                  Version 1.0.2
# ═══════════════════════════════════════════════════════════════════════════════
#
#  All messages support:
#  - Color codes (&a, &b, etc.)
#  - Hex colors (&#FF5555)
#  - MiniMessage format (<red>, <gradient:red:blue>, etc.)
#  - PlaceholderAPI placeholders
#  - Plugin placeholders {player}, {target}, etc.
#
# ═══════════════════════════════════════════════════════════════════════════════

language:
  code: "en"
  name: "English"
  flag: "🇺🇸"
  version: "1.0.2"

# ██████╗ ███████╗███╗   ██╗███████╗██████╗  █████╗ ██╗
# ██╔════╝ ██╔════╝████╗  ██║██╔════╝██╔══██╗██╔══██╗██║
# ██║  ███╗█████╗  ██╔██╗ ██║█████╗  ██████╔╝███████║██║
# ██║   ██║██╔══╝  ██║╚██╗██║██╔══╝  ██╔══██╗██╔══██║██║
# ╚██████╔╝███████╗██║ ╚████║███████╗██║  ██║██║  ██║███████╗
#  ╚═════╝ ╚══════╝╚═╝  ╚═══╝╚══════╝╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝

general:
  prefix: "&8[&6UltimateDuels&8] "
  # Join/Quit messages (broadcast to all players)
  join-broadcast: "&e{player} &7joined the game!"
  quit-broadcast: "&e{player} &7left the game."

  # Welcome messages (shown to the joining player)
  welcome-back: "&7Welcome back, &e{player}&7!"
  welcome-stats: "&7Your Stats: &a{wins} Wins &7| &c{losses} Losses &7| &6{elo} Elo"
  welcome-new: "&7Welcome, &e{player}&7!"
  welcome-hint: "&7Use the items in your hotbar to get started."

  no-permission: "{prefix}&cYou don't have permission to do that!"
  player-only: "{prefix}&cThis command can only be used by players!"
  console-only: "{prefix}&cThis command can only be used from console!"
  player-not-found: "{prefix}&cPlayer &e{player} &cwas not found!"
  player-offline: "{prefix}&cPlayer &e{player} &cis not online!"
  player-not-in-lobby: "{prefix}&cYou must be in the lobby to do that!"
  player-busy: "{prefix}&c{player} is currently busy!"
  invalid-number: "{prefix}&c'{input}' is not a valid number!"
  invalid-argument: "{prefix}&cInvalid argument! Usage: &e{usage}"
  reload-start: "{prefix}&7Reloading configuration..."
  reload-complete: "{prefix}&aConfiguration reloaded successfully!"
  reload-failed: "{prefix}&cFailed to reload configuration! Check console."
  plugin-disabled: "{prefix}&cThis feature is currently disabled!"
  cooldown: "{prefix}&cPlease wait &e{time} &cbefore doing that again!"
  database-error: "{prefix}&cA database error occurred. Please try again later."
  join-message: "{prefix}&aWelcome to &6Ultimate Duels&a! Type &e/duel &ato get started."
  quit-message: "&e{player} &7has left the server."
  staff-notification: "&8[&6Staff&8] &7{message}"
  player-in-duel: "{prefix}&cYou cannot use this command while in a duel!"
  player-in-ffa: "{prefix}&cYou cannot use this command while in an FFA arena!"
  player-spectating: "{prefix}&cYou cannot use this command while spectating!"
  language-menu-title: "&6&l▬▬▬▬▬▬ LANGUAGE MENU ▬▬▬▬▬▬"
  language-menu-current: "&7Current Language: &a{language}"
  language-menu-available: "&eAvailable Languages:"
  language-menu-click: "&eClick to select"
  language-changed: "{prefix}&aLanguage changed to &e{language}&a!"
  language-already-selected: "{prefix}&cYou are already using &e{language}&c!"
  language-not-available: "{prefix}&cLanguage &e{language} &cis not available!"
  language-reload-success: "{prefix}&aLanguages reloaded successfully!"

# ██████╗ ██╗   ██╗███████╗██╗
# ██╔══██╗██║   ██║██╔════╝██║
# ██║  ██║██║   ██║█████╗  ██║
# ██║  ██║██║   ██║██╔══╝  ██║
# ██████╔╝╚██████╔╝███████╗███████╗
# ╚═════╝  ╚═════╝ ╚══════╝╚══════╝

duel:
  # ════════════════════════════════════════════════════════════════════════════
  # ERROR MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  cannot-duel-self: "{prefix}&cYou cannot duel yourself!"
  already-in-match: "{prefix}&cYou are already in a match!"
  target-in-match: "{prefix}&c{player} is already in a match!"
  sender-in-queue: "{prefix}&cYou are in a queue! Leave first with /leavequeue"
  target-in-queue: "{prefix}&c{player} is in a queue!"
  kit-not-found: "{prefix}&cThe kit &e{kit} &cdoes not exist!"
  arena-not-found: "{prefix}&cThe arena &e{arena} &cdoes not exist!"
  no-available-arenas: "{prefix}&cNo arenas are currently available!"

  # ════════════════════════════════════════════════════════════════════════════
  # DUEL REQUEST MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  request:
    sent-header: "&a&lDUEL REQUEST SENT!"
    sent-target: "&7Target: &e{target}"
    sent-kit: "&7Kit: &e{kit}"
    sent-arena: "&7Arena: &e{arena}"
    sent-rounds: "&7Rounds: &e{rounds}"
    sent-waiting: "&7Waiting for response..."
    sent-success: "&aDuel request sent to &e{target}&a!"

    received-header: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
    received-title: "&e&lDUEL REQUEST!"
    received-from: "&7From: &a{sender}"
    received-kit: "&7Kit: &e{kit}"
    received-arena: "&7Arena: &e{arena}"
    received-rounds: "&7Rounds: &e{rounds}"
    received-accept: "&a/accept &7- Accept the duel"
    received-deny: "&c/deny &7- Deny the duel"
    received-footer: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

    # Hover messages for clickable text
    received-hover-accept: "&aClick to accept the duel!"
    received-hover-deny: "&cClick to deny the duel!"

    # Request expiration
    expired-sender: "{prefix}&cYour duel request to &e{target} &chas expired."
    expired-receiver: "{prefix}&cThe duel request from &e{player} &chas expired."

    # Request cancellation
    cancelled: "{prefix}&cYou cancelled your duel request to &e{target}&c."
    cancelled-receiver: "{prefix}&c{player} &ccancelled their duel request."

    # Duplicate requests
    already-sent: "{prefix}&cYou already have a pending duel request to &e{target}&c!"
    already-pending: "{prefix}&cYou already have a pending duel request!"

    # Request validation errors
    self-duel: "{prefix}&cYou cannot duel yourself!"
    disabled-target: "{prefix}&c{target} has disabled duel requests!"
    in-duel: "{prefix}&cYou are already in a duel!"
    target-in-duel: "{prefix}&c{target} is already in a duel!"
    in-queue: "{prefix}&cYou are currently in a queue! Leave first."
    target-in-queue: "{prefix}&c{target} is currently in a queue!"
    no-pending: "{prefix}&cYou don't have any pending duel requests from &e{player}&c!"

  # ════════════════════════════════════════════════════════════════════════════
  # ACCEPT MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  accept:
    no-request: "{prefix}&cYou have no pending duel requests!"
    expired: "{prefix}&cThis duel request has expired!"
    sender-offline: "{prefix}&cThe player who sent the request is no longer online!"
    already-in-match: "{prefix}&cOne of the players is already in a match!"
    no-arenas: "{prefix}&cNo arenas are currently available! Try again later."
    accepted-you: "&aYou accepted the duel request from &e{sender}&a!"
    accepted-them: "&a{target} &aaccepted your duel request!"
    success: "&aDuel accepted!"

  # ════════════════════════════════════════════════════════════════════════════
  # DENY MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  deny:
    no-request: "{prefix}&cYou have no pending duel requests!"
    denied-you: "&cYou denied the duel request."
    denied-them: "&c{player} denied your duel request."

  # ════════════════════════════════════════════════════════════════════════════
  # COUNTDOWN MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  countdown:
    title: "&c{seconds}"
    subtitle: "&7Get ready to fight!"
    fight-title: "&a&lFIGHT!"
    fight-subtitle: "&7Good luck!"
    starting: "{prefix}&7Duel starting in &e{seconds} &7seconds..."

  # ════════════════════════════════════════════════════════════════════════════
  # ROUND MESSAGES (Multi-round duels)
  # ════════════════════════════════════════════════════════════════════════════
  round:
    start: "{prefix}&6Round &e{round}&6/&e{max_rounds} &6has started!"
    end: "{prefix}&e{winner} &6won Round &e{round}&6!"
    won: "&a&lROUND WON! &7Score: &e{score}"
    lost: "&c&lROUND LOST! &7Score: &e{score}"
    starting: "&e&lRound {round} starting..."
    preparing: "&e&lPreparing for Round {round}..."
    fight: "&a&lFIGHT!"
    player-died: "&c{player} &7was killed by &a{killer}&7!"
    reset: "{prefix}&7Resetting for next round..."

  # ════════════════════════════════════════════════════════════════════════════
  # ARENA REGENERATION MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  arena:
    regenerating: "&e&lPreparing arena for next round..."
    ready: "&a&lArena ready! Starting round {round}..."
    regen-failed: "&e&lArena regeneration skipped - continuing match..."
    restoring: "&7Restoring arena &e{arena}&7..."
    restored: "&aArena &e{arena} &ahas been restored!"

  # ════════════════════════════════════════════════════════════════════════════
  # MATCH END MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  match:
    victory-title: "&a&lVICTORY!"
    victory-subtitle: "&7You won the duel!"
    defeat-title: "&c&lDEFEAT"
    defeat-subtitle: "&7Better luck next time!"
    draw-title: "&e&lDRAW"
    draw-subtitle: "&7It's a tie!"

    # Broadcast message
    winner-broadcast: "&6{winner} &ehas defeated &6{loser} &ein a duel! &7(&b{kit}&7)"

    # Match statistics screen
    statistics:
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - "&e&lDUEL RESULTS"
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""
      - "&7Winner: &a{winner}"
      - "&7Loser: &c{loser}"
      - "&7Final Score: &e{score}"
      - ""
      - "&7Kit: &b{kit}"
      - "&7Arena: &d{arena}"
      - "&7Duration: &f{duration}"
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""

  # ════════════════════════════════════════════════════════════════════════════
  # FORFEIT MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  forfeit:
    not-in-match: "&cYou are not in a duel!"
    cannot-forfeit: "&cYou cannot forfeit right now!"
    self: "{prefix}&cYou have forfeited the duel!"
    opponent: "{prefix}&e{player} &chas forfeited the duel! You win!"
    broadcast: "&e{player} &cforfeited their duel against &e{opponent}&c!"

  # ════════════════════════════════════════════════════════════════════════════
  # DISCONNECT MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  disconnect:
    self: "{prefix}&cYou have been disconnected from the duel."
    opponent: "{prefix}&e{player} &chas disconnected! You win!"
    broadcast: "&e{player} &cdisconnected from their duel!"

  # ════════════════════════════════════════════════════════════════════════════
  # SPECTATOR MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  spectator:
    round-ended: "&7Round {round}/{total} ended! Score: &e{score}"
    round-starting: "&7Round {round} starting..."
    match-over: "&a&lMATCH OVER! &7Winner: &e{winner}"
    match-cancelled: "&cThe match was cancelled."

  # ════════════════════════════════════════════════════════════════════════════
  # TELEPORTATION MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  teleport:
    teleporting: "&7Teleporting to arena..."
    teleported: "&aTeleported to arena &e{arena}&a!"
    failed: "&cFailed to teleport to arena!"

  # ════════════════════════════════════════════════════════════════════════════
  # ERROR RECOVERY MESSAGES
  # ════════════════════════════════════════════════════════════════════════════
  error:
    match-cancelled: "{prefix}&cThe match was cancelled: &e{reason}"
    kit-load-failed: "{prefix}&cFailed to load kit!"
    arena-load-failed: "{prefix}&cFailed to load arena!"
    unexpected-error: "{prefix}&cAn unexpected error occurred. Please contact an administrator."

# ██████╗ ██╗   ██╗███████╗██╗   ██╗███████╗
# ██╔═══██╗██║   ██║██╔════╝██║   ██║██╔════╝
# ██║   ██║██║   ██║█████╗  ██║   ██║█████╗
# ██║▄▄ ██║██║   ██║██╔══╝  ██║   ██║██╔══╝
# ╚██████╔╝╚██████╔╝███████╗╚██████╔╝███████╗
