duel:
  # ════════════════════════════════════════════════════════════════════════════
  # FEHLERMELDUNGEN
  # ════════════════════════════════════════════════════════════════════════════
  cannot-duel-self: "{prefix}&cDu kannst dich nicht selbst herausfordern!"
  already-in-match: "{prefix}&cDu bist bereits in einem Kampf!"
  target-in-match: "{prefix}&c{player} ist bereits in einem Kampf!"
  sender-in-queue: "{prefix}&cDu bist in einer Warteschlange! Verlasse sie zuerst mit /leavequeue"
  target-in-queue: "{prefix}&c{player} ist in einer Warteschlange!"
  kit-not-found: "{prefix}&cDas Kit &e{kit} &cexistiert nicht!"
  arena-not-found: "{prefix}&cDie Arena &e{arena} &cexistiert nicht!"
  no-available-arenas: "{prefix}&cKeine Arenen sind derzeit verfügbar!"

  # ════════════════════════════════════════════════════════════════════════════
  # DUELLANFRAGE-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  request:
    # Nachrichten an den Absender wenn Anfrage gesendet wird
    sent-header: "&a&lDUELLANFRAGE GESENDET!"
    sent-target: "&7Ziel: &e{target}"
    sent-kit: "&7Kit: &e{kit}"
    sent-arena: "&7Arena: &e{arena}"
    sent-rounds: "&7Runden: &e{rounds}"
    sent-waiting: "&7Warte auf Antwort..."
    sent-success: "&aDuellanfrage an &e{target} &agesendet!"

    # Nachrichten an den Empfänger wenn er eine Anfrage erhält
    received-header: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
    received-title: "&e&lDUELLANFRAGE!"
    received-from: "&7Von: &a{sender}"
    received-kit: "&7Kit: &e{kit}"
    received-arena: "&7Arena: &e{arena}"
    received-rounds: "&7Runden: &e{rounds}"
    received-accept: "&a/accept &7- Duell annehmen"
    received-deny: "&c/deny &7- Duell ablehnen"
    received-footer: "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

    # Hover-Nachrichten für klickbaren Text
    received-hover-accept: "&aKlicke um das Duell anzunehmen!"
    received-hover-deny: "&cKlicke um das Duell abzulehnen!"

    # Anfrage-Ablauf
    expired-sender: "{prefix}&cDeine Duellanfrage an &e{target} &cist abgelaufen."
    expired-receiver: "{prefix}&cDie Duellanfrage von &e{player} &cist abgelaufen."

    # Anfrage-Stornierung
    cancelled: "{prefix}&cDu hast deine Duellanfrage an &e{target} &cabgebrochen."
    cancelled-receiver: "{prefix}&c{player} &chat seine Duellanfrage abgebrochen."

    # Doppelte Anfragen
    already-sent: "{prefix}&cDu hast bereits eine ausstehende Duellanfrage an &e{target}&c!"
    already-pending: "{prefix}&cDu hast bereits eine ausstehende Duellanfrage!"

    # Anfrage-Validierungsfehler
    self-duel: "{prefix}&cDu kannst dich nicht selbst herausfordern!"
    disabled-target: "{prefix}&c{target} hat Duellanfragen deaktiviert!"
    in-duel: "{prefix}&cDu bist bereits in einem Duell!"
    target-in-duel: "{prefix}&c{target} ist bereits in einem Duell!"
    in-queue: "{prefix}&cDu bist derzeit in einer Warteschlange! Verlasse sie zuerst."
    target-in-queue: "{prefix}&c{target} ist derzeit in einer Warteschlange!"
    no-pending: "{prefix}&cDu hast keine ausstehenden Duellanfragen von &e{player}&c!"

  # ════════════════════════════════════════════════════════════════════════════
  # ANNAHME-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  accept:
    no-request: "{prefix}&cDu hast keine ausstehenden Duellanfragen!"
    expired: "{prefix}&cDiese Duellanfrage ist abgelaufen!"
    sender-offline: "{prefix}&cDer Spieler, der die Anfrage gesendet hat, ist nicht mehr online!"
    already-in-match: "{prefix}&cEiner der Spieler ist bereits in einem Kampf!"
    no-arenas: "{prefix}&cKeine Arenen sind derzeit verfügbar! Versuche es später erneut."
    accepted-you: "&aDu hast die Duellanfrage von &e{sender} &aangenommen!"
    accepted-them: "&a{target} &ahat deine Duellanfrage angenommen!"
    success: "&aDuell angenommen!"

  # ════════════════════════════════════════════════════════════════════════════
  # ABLEHNUNGS-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  deny:
    no-request: "{prefix}&cDu hast keine ausstehenden Duellanfragen!"
    denied-you: "&cDu hast die Duellanfrage abgelehnt."
    denied-them: "&c{player} hat deine Duellanfrage abgelehnt."

  # ════════════════════════════════════════════════════════════════════════════
  # COUNTDOWN-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  countdown:
    title: "&c{seconds}"
    subtitle: "&7Mach dich bereit zum Kämpfen!"
    fight-title: "&a&lKÄMPFEN!"
    fight-subtitle: "&7Viel Glück!"
    starting: "{prefix}&7Duell startet in &e{seconds} &7Sekunden..."

  # ════════════════════════════════════════════════════════════════════════════
  # RUNDEN-NACHRICHTEN (Mehrrunden-Duelle)
  # ════════════════════════════════════════════════════════════════════════════
  round:
    start: "{prefix}&6Runde &e{round}&6/&e{max_rounds} &6hat begonnen!"
    end: "{prefix}&e{winner} &6hat Runde &e{round} &6gewonnen!"
    won: "&a&lRUNDE GEWONNEN! &7Punktzahl: &e{score}"
    lost: "&c&lRUNDE VERLOREN! &7Punktzahl: &e{score}"
    starting: "&e&lRunde {round} startet..."
    preparing: "&e&lVorbereitung auf Runde {round}..."
    fight: "&a&lKÄMPFEN!"
    player-died: "&c{player} &7wurde von &a{killer} &7getötet!"
    reset: "{prefix}&7Zurücksetzen für nächste Runde..."

  # ════════════════════════════════════════════════════════════════════════════
  # ARENA-REGENERIERUNGS-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  arena:
    regenerating: "&e&lArena wird für nächste Runde vorbereitet..."
    ready: "&a&lArena bereit! Starte Runde {round}..."
    regen-failed: "&e&lArena-Regenerierung übersprungen - Kampf wird fortgesetzt..."
    restoring: "&7Arena &e{arena} &7wird wiederhergestellt..."
    restored: "&aArena &e{arena} &awurde wiederhergestellt!"

  # ════════════════════════════════════════════════════════════════════════════
  # KAMPF-ENDE-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  match:
    victory-title: "&a&lSIEG!"
    victory-subtitle: "&7Du hast das Duell gewonnen!"
    defeat-title: "&c&lNIEDERLAGE"
    defeat-subtitle: "&7Nächstes Mal mehr Glück!"
    draw-title: "&e&lUNENTSCHIEDEN"
    draw-subtitle: "&7Es ist ein Unentschieden!"

    # Broadcast-Nachricht
    winner-broadcast: "&6{winner} &ehat &6{loser} &ein einem Duell besiegt! &7(&b{kit}&7)"

    # Kampfstatistik-Bildschirm
    statistics:
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - "&e&lDUELL-ERGEBNISSE"
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""
      - "&7Gewinner: &a{winner}"
      - "&7Verlierer: &c{loser}"
      - "&7Endpunktzahl: &e{score}"
      - ""
      - "&7Kit: &b{kit}"
      - "&7Arena: &d{arena}"
      - "&7Dauer: &f{duration}"
      - ""
      - "&6&l▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      - ""

  # ════════════════════════════════════════════════════════════════════════════
  # AUFGABE-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  forfeit:
    self: "{prefix}&cDu hast das Duell aufgegeben!"
    opponent: "{prefix}&e{player} &chat das Duell aufgegeben! Du gewinnst!"
    broadcast: "&e{player} &chat sein Duell gegen &e{opponent} &caufgegeben!"

  # ════════════════════════════════════════════════════════════════════════════
  # VERBINDUNGSABBRUCH-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  disconnect:
    self: "{prefix}&cDu wurdest vom Duell getrennt."
    opponent: "{prefix}&e{player} &chat die Verbindung getrennt! Du gewinnst!"
    broadcast: "&e{player} &chat die Verbindung während des Duells getrennt!"

  # ════════════════════════════════════════════════════════════════════════════
  # ZUSCHAUER-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  spectator:
    round-ended: "&7Runde {round}/{total} beendet! Punktzahl: &e{score}"
    round-starting: "&7Runde {round} startet..."
    match-over: "&a&lKAMPF VORBEI! &7Gewinner: &e{winner}"
    match-cancelled: "&cDer Kampf wurde abgebrochen."

  # ════════════════════════════════════════════════════════════════════════════
  # TELEPORTATIONS-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  teleport:
    teleporting: "&7Teleportiere zur Arena..."
    teleported: "&aZur Arena &e{arena} &ateleportiert!"
    failed: "&cTeleportation zur Arena fehlgeschlagen!"

  # ════════════════════════════════════════════════════════════════════════════
  # FEHLER-WIEDERHERSTELLUNGS-NACHRICHTEN
  # ════════════════════════════════════════════════════════════════════════════
  error:
    match-cancelled: "{prefix}&cDer Kampf wurde abgebrochen: &e{reason}"
    kit-load-failed: "{prefix}&cKit konnte nicht geladen werden!"
    arena-load-failed: "{prefix}&cArena konnte nicht geladen werden!"
    unexpected-error: "{prefix}&cEin unerwarteter Fehler ist aufgetreten. Bitte kontaktiere einen Administrator."

