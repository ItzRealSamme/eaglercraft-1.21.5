  welcome-new: "&7Willkommen, &e{player}&7!"
  welcome-hint: "&7Benutze die Items in deiner Hotbar, um loszulegen."

  no-permission: "{prefix}&cDu hast keine Berechtigung dafür!"
  player-only: "{prefix}&cDieser Befehl kann nur von Spielern verwendet werden!"
  console-only: "{prefix}&cDieser Befehl kann nur von der Konsole verwendet werden!"
