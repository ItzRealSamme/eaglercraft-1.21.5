  invalid-number: "{prefix}&c'{input}' ist keine gültige Zahl!"
  invalid-argument: "{prefix}&cUngültiges Argument! Verwendung: &e{usage}"
  reload-start: "{prefix}&7Konfiguration wird neu geladen..."
  reload-complete: "{prefix}&aKonfiguration erfolgreich neu geladen!"
  reload-failed: "{prefix}&cFehler beim Neuladen der Konfiguration! Überprüfe die Konsole."
  plugin-disabled: "{prefix}&cDiese Funktion ist derzeit deaktiviert!"
  cooldown: "{prefix}&cBitte warte &e{time} &cbevor du das erneut tust!"
  database-error: "{prefix}&cEin Datenbankfehler ist aufgetreten. Bitte versuche es später erneut."
  join-message: "{prefix}&aWillkommen bei &6Ultimate Duels&a! Tippe &e/duel &aum zu beginnen."
  quit-message: "&e{player} &7hat den Server verlassen."
  staff-notification: "&8[&6Staff&8] &7{message}"
  player-in-duel: "{prefix}&cDu kannst diesen Befehl nicht während eines Duells verwenden!"
  player-in-ffa: "{prefix}&cDu kannst diesen Befehl nicht während einer FFA-Arena verwenden!"
  player-spectating: "{prefix}&cDu kannst diesen Befehl nicht während des Zuschauens verwenden!"
  language-menu-title: "&6&l▬▬▬▬▬▬ SPRACHMENÜ ▬▬▬▬▬▬"
  language-menu-current: "&7Aktuelle Sprache: &a{language}"
  language-menu-available: "&eVerfügbare Sprachen:"
  language-menu-click: "&eKlicken zum Auswählen"
