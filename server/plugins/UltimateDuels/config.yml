scoreboard:
  # Enable scoreboard system
  enabled: true

  # Worlds where scoreboards should be enabled (case-insensitive)
  # Leave empty to disable scoreboards in all worlds except during duels/FFA
  worlds:
    - "world"          # Main world - shows lobby scoreboard
    - "lobby"          # Lobby world - shows lobby scoreboard
    - "duels"          # Duels world - shows leaderboard scoreboard
    - "duel_lobby"     # Duel lobby world - shows leaderboard scoreboard
    - "arena"          # Arena world - shows leaderboard scoreboard

  # Which worlds show the leaderboard (subset of 'worlds' above)
  # If not specified, any world with "duel" or "arena" in the name will show leaderboard
  leaderboard-worlds:
    - "duels"
    - "duel_lobby"
    - "arena"

  # Update intervals (in ticks, 20 ticks = 1 second)
  update-intervals:
    duel: 5        # During active duels
    duel-lobby: 20 # In duel lobby/queue
    ffa: 10        # In FFA
    lobby: 40      # Main lobby

  # Lobby scoreboard
  lobby:
    title: "<gold><bold>ULTIMATE DUELS"
    lines:
      - ""
      - "<gray>Welcome, <white>{player}"
      - ""
      - "<gold>Statistics:"
      - "  <gray>Kills: <green>{kills}"
      - "  <gray>Deaths: <red>{deaths}"
      - "  <gray>K/D: <yellow>{kd}"
      - "  <gray>Win Streak: <aqua>{streak}"
      - ""
      - "<gold>Queue:"
      - "  <gray>In Queue: <green>{queue_count}"
      - "  <gray>Fighting: <red>{fighting_count}"
      - ""
      - "<yellow>{website}"

  # Duel lobby scoreboard (shows leaderboard)
  duel-lobby:
    title: "<gold><bold>DUEL LOBBY"
    lines:
      - ""
      - "<gray>Your Stats:"
      - "  <gray>Wins: <green>{wins}"
      - "  <gray>Losses: <red>{losses}"
      - "  <gray>ELO: <yellow>{elo}"
      - ""
      - "<gold>Top Players:"
      - "  <yellow>1. <white>{top1_name} <gray>- <green>{top1_wins}"
      - "  <yellow>2. <white>{top2_name} <gray>- <green>{top2_wins}"
      - "  <yellow>3. <white>{top3_name} <gray>- <green>{top3_wins}"
      - ""
      - "<gray>Online: <green>{online_count}"
      - "<gray>In Queue: <aqua>{queue_count}"
      - ""
      - "<yellow>{website}"

  # In-game scoreboard
  ingame:
    title: "<gold><bold>DUEL"
    lines:
      - ""
      - "<gray>{player_name} <dark_gray>| <green>{player_ping}ms"
      - "<gray>vs"
      - "<red>{opponent_name} <dark_gray>| <green>{opponent_ping}ms"
      - ""
      - "<gold>Score: <green>{player_score} <gray>- <red>{opponent_score}"
      - "<gray>Round: <yellow>{current_round}/{max_rounds}"
      - ""
      - "<gray>Kit: <aqua>{kit_name}"
      - "<gray>Arena: <light_purple>{arena_name}"
      - ""
      - "<yellow>{website}"

  # FFA scoreboard
  ffa:
    title: "<red><bold>FFA"
    lines:
      - ""
      - "<gray>Kit: <aqua>{kit_name}"
      - "<gray>Arena: <light_purple>{arena_name}"
      - ""
      - "<gold>Your Stats:"
      - "  <gray>Kills: <green>{ffa_kills}"
      - "  <gray>Deaths: <red>{ffa_deaths}"
      - ""
      - "<gray>Players: <yellow>{player_count}"
      - ""
      - "<yellow>{website}"

  # Spectator scoreboard
  spectator:
    title: "<gray><bold>SPECTATING"
    lines:
      - ""
      - "<green>{player1_name} <gray>vs <red>{player2_name}"
      - ""
      - "<gold>Score: <green>{score1} <gray>- <red>{score2}"
      - "<gray>Round: <yellow>{current_round}/{max_rounds}"
      - ""
      - "<gray>Kit: <aqua>{kit_name}"
      - "<gray>Arena: <light_purple>{arena_name}"
      - ""
      - "<yellow>{website}"

