lobby:
  # Enable/disable the entire lobby system
  # If disabled, players won't be managed by UltimateDuels lobby
  enabled: false

  # Lobby world name (will be created if it doesn't exist)
  world: "duels_lobby"

  # Spawn location in the lobby
  spawn:
    x: 0.5
    y: 100.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0

  # Teleport to lobby on join
  # Set to false if you use another plugin (like DeluxeHub) to manage spawn
  teleport-on-join: false

  # Give lobby items to players on join
  # Set to false if you want to use another plugin's items
  give-items-on-join: false

  # Players joining for first time get teleported
  first-join-teleport: false

  # Only manage players who are in the lobby world
  # If true, players in other worlds won't get lobby items/protections
  world-restriction: true

  # Gamemode in lobby (ADVENTURE or SURVIVAL)
  # ADVENTURE = Default (prevents block breaking, recommended)
  # SURVIVAL = Allows normal survival gameplay
  lobby-gamemode: ADVENTURE

  # Lobby protection settings
  protection:
    # Prevent block breaking/placing
    prevent-building: true
    # Prevent PvP in lobby
    prevent-pvp: true
    # Prevent hunger loss
    prevent-hunger: true
    # Prevent fall damage
    prevent-fall-damage: true
    # Prevent all damage
    prevent-damage: true
    # Prevent item dropping
    prevent-item-drop: true
    # Prevent item pickup
    prevent-item-pickup: true
    # Prevent weather changes
    fixed-weather: true
    weather: "CLEAR"
    # Fixed time
    fixed-time: true
    time: 6000

  # Border settings (optional)
  border:
    enabled: false
    center-x: 0
    center-z: 0
    radius: 500

# ██╗  ██╗ ██████╗ ████████╗██████╗  █████╗ ██████╗
