general:
  # Plugin prefix for all messages
  prefix: "&8[&6UltimateDuels&8] "

  # Debug mode - Enable for detailed console logging
  debug: false

  # Enable/disable welcome message when players join
  welcome-message-enabled: true

  # Enable/disable quit messages
  quit-message-enabled: true

  # Language file to use (messages_en.yml, messages_es.yml, etc.)
  language: "messages"

  # Auto-save interval in minutes (player data, stats)
  auto-save-interval: 5

  # Allow players to receive/send duel requests
  default-duel-requests-enabled: true

  # Maximum ping allowed for competitive dueling (0 = disabled)
  max-ping-limit: 0

  # Website URL displayed on scoreboards
  website-url: "play.yourserver.com"

# ██████╗  █████╗ ████████╗ █████╗ ██████╗  █████╗ ███████╗███████╗
# ██╔══██╗██╔══██╗╚══██╔══╝██╔══██╗██╔══██╗██╔══██╗██╔════╝██╔════╝
# ██║  ██║███████║   ██║   ███████║██████╔╝███████║███████╗█████╗
# ██║  ██║██╔══██║   ██║   ██╔══██║██╔══██╗██╔══██║╚════██║██╔══╝
# ██████╔╝██║  ██║   ██║   ██║  ██║██████╔╝██║  ██║███████║███████╗
# ╚═════╝ ╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝╚═════╝ ╚═╝  ╚═╝╚══════╝╚══════╝

database:
  # Storage type: MYSQL or SQLITE
  # MySQL = Stats storage | YAML = Arenas, Kits, Configs
  type: "MYSQL"

  mysql:
    host: "localhost"
    port: 3306
    database: "ultimateduels"
    username: "root"
    password: "password"

    # Connection pool settings (HikariCP)
    pool:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

    # Table prefix
    table-prefix: "ud_"

    # SSL Settings
    use-ssl: false
    verify-server-certificate: false

  sqlite:
    # Used as fallback if MySQL is unavailable
    file: "data/ultimateduels.db"

  # Auto-purge inactive players (days since last login, 0 = disabled)
  purge-inactive-days: 0

# ██╗      ██████╗ ██████╗ ██████╗ ██╗   ██╗
# ██║     ██╔═══██╗██╔══██╗██╔══██╗╚██╗ ██╔╝
