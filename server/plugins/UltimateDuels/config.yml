# ██║     ██╔══██║██║╚██╗██║██║   ██║██║   ██║██╔══██║██║   ██║██╔══╝
# ███████╗██║  ██║██║ ╚████║╚██████╔╝╚██████╔╝██║  ██║╚██████╔╝███████╗
# ╚══════╝╚═╝  ╚═╝╚═╝  ╚═══╝ ╚═════╝  ╚═════╝ ╚═╝  ╚═╝ ╚═════╝ ╚══════╝


language:
  # Default language for new players
  # Available built-in languages: en, ru, es, de, fr, pt, zh, ja, ko, ar
  # You can add custom languages by creating files in /languages folder
  default: "en"

  # Allow players to change their language with /language command
  allow-player-change: true

  # Auto-detect player's client language (experimental)
  # Requires client-side language detection support
  auto-detect: false

  # Use fallback language if a message is missing in player's language
  # Recommended: true (prevents missing message errors)
  use-fallback: true

  # Save player language preferences to file
  # If false, players will need to select language each time they join
  save-player-preferences: true

  # Cache language files for better performance
  # Recommended: true (significantly improves performance)
  cache-messages: true


# ██████╗ ██╗   ██╗███████╗██╗     ███████╗
# ██╔══██╗██║   ██║██╔════╝██║     ██╔════╝
# ██║  ██║██║   ██║█████╗  ██║     ███████╗
# ██║  ██║██║   ██║██╔══╝  ██║     ╚════██║
# ██████╔╝╚██████╔╝███████╗███████╗███████║
# ╚═════╝  ╚═════╝ ╚══════╝╚══════╝╚══════╝

duels:
  # Duel request settings
  requests:
    # How long a duel request lasts (seconds)
    expiry-time: 60
    # Cooldown between sending requests (seconds)
    cooldown: 5
    # Allow self-dueling (for testing)
    allow-self-duel: false
    # Allow dueling across worlds
    cross-world-duels: true

  # Round settings
  rounds:
    # Minimum rounds allowed
    minimum: 1
    # Maximum rounds allowed
    maximum: 20
    # Default rounds for quick duels
    default: 1

    # Win conditions
    win-conditions:
      # BEST_OF = First to win (rounds/2)+1
      # PLAY_ALL = Play all rounds, most wins
      default: "BEST_OF"
      allow-change: true

  # Countdown before each round
  countdown:
    # Countdown duration in seconds
    duration: 3
    # Sound played each second
    tick-sound: "BLOCK_NOTE_BLOCK_HAT"
    tick-pitch: 1.0
    tick-volume: 1.0
    # Sound played when fight starts
    start-sound: "ENTITY_ENDER_DRAGON_GROWL"
    start-pitch: 1.0
    start-volume: 1.0
    # Title settings
    show-title: true
    title-fade-in: 0
    title-stay: 20
    title-fade-out: 5

  # Post-round settings
  post-round:
    # Delay before next round starts (seconds)
    delay: 2
    # Heal players between rounds
    heal-players: true
    # Clear potion effects between rounds
    clear-effects: true
    # Reset hunger between rounds
    reset-hunger: true
    # Re-apply kit (including offhand)
    reapply-kit: true
    # Drop items on death
    drop-items: false

  # Post-match settings
  post-match:
    # Time for winner celebration (seconds)
    celebration-time: 3
    # Time loser spectates before teleport (seconds)
    loser-spectate-time: 3
    # Teleport to lobby after match
    teleport-to-lobby: true
    # Show end-game statistics
    show-statistics: true
    # Sound for winner
    winner-sound: "UI_TOAST_CHALLENGE_COMPLETE"
    # Sound for loser
    loser-sound: "ENTITY_WITHER_DEATH"

  # Combat settings
  combat:
    # Keep inventory on death (items dropped in arena, not lost)
    keep-inventory: false
    # Allow natural regeneration
    natural-regeneration: true
    # Enable old combat mechanics (1.8 style)
    legacy-pvp: false
    # Disable attack cooldown
    no-attack-cooldown: false
    # Allow totems of undying
    allow-totems: true
    # Clear arrows on death
    clear-arrows: true

  # Anti-cheat integration
  anti-cheat:
    # Bypass anti-cheat during duels
    bypass-during-duel: false
    # Plugins to notify
    notify-plugins: []

# ██████╗ ██╗   ██╗███████╗██╗   ██╗███████╗
# ██╔═══██╗██║   ██║██╔════╝██║   ██║██╔════╝
# ██║   ██║██║   ██║█████╗  ██║   ██║█████╗
# ██║▄▄ ██║██║   ██║██╔══╝  ██║   ██║██╔══╝
# ╚██████╔╝╚██████╔╝███████╗╚██████╔╝███████╗
#  ╚══▀▀═╝  ╚═════╝ ╚══════╝ ╚═════╝ ╚══════╝

queue:
  # Queue update interval (ticks, 20 = 1 second)
  update-interval: 20

  # Maximum time in queue before auto-remove (seconds, 0 = disabled)
  max-queue-time: 0

  # Match players by similar ELO/stats
  skill-based-matching:
    enabled: false
    # ELO difference threshold
    elo-threshold: 200
    # Expand threshold over time (per 30 seconds)
    expand-threshold: 50

  # Queue restrictions
  restrictions:
    # Minimum level to queue
    minimum-level: 0
    # Require verified email (if using auth plugin)
    require-verified: false

  # Notifications
  notifications:
    # Notify when someone joins queue
    join-broadcast: false
    # Sound when match found
    match-found-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"

# ███████╗███████╗ █████╗
# ██╔════╝██╔════╝██╔══██╗
# █████╗  █████╗  ███████║
# ██╔══╝  ██╔══╝  ██╔══██║
# ██║     ██║     ██║  ██║
# ╚═╝     ╚═╝     ╚═╝  ╚═╝

ffa:
  # Enable/disable FFA system
  enabled: true

  # ─────────────────────────────────────────────────────────────────────────────
  # BLOCK PROTECTION
  # Global FFA block break/place restrictions (overrides kit settings)
  # ─────────────────────────────────────────────────────────────────────────────
  # Allow players to break blocks in FFA arenas
  # Set to false to PREVENT all block breaking (even if kit allows it)
  allow-block-break: false

  # Allow players to place blocks in FFA arenas
  # Set to false to PREVENT all block placing (even if kit allows it)
  allow-block-place: false

  # Combat tag duration (seconds)
  # Used for kill credit when victim dies after attacker disconnects
  combat-tag-seconds: 10

  # Minimum players in arena for stats to count
  min-players-for-stats: 2

  # Announce kills in arena chat
  announce-kills: true

  # ─────────────────────────────────────────────────────────────────────────────
  # SPAWN PROTECTION
  # ─────────────────────────────────────────────────────────────────────────────
  spawn-protection:
    # Enable spawn protection for newly spawned/joined players
    enabled: true
    # Duration in ticks (20 ticks = 1 second)
    ticks: 60

  # ─────────────────────────────────────────────────────────────────────────────
  # RESPAWN SETTINGS
  # What happens when a player dies
  # ─────────────────────────────────────────────────────────────────────────────
  respawn:
    # true = Teleport to lobby on death (player must rejoin)
    # false = Instant respawn in arena
    teleport-to-lobby: true
    # Delay before teleport/respawn (seconds)
    # Set to 0 for instant
    delay: 0
    # Show death message in arena chat
    show-death-message: true

  # ─────────────────────────────────────────────────────────────────────────────
  # KILL REWARDS
  # Rewards given to players when they get a kill
  # ─────────────────────────────────────────────────────────────────────────────
  kill-rewards:
    # Enable/disable kill rewards system
    enabled: true

    # ── HEALING ──
    # Heal the killer on kill
    heal-on-kill: true
    # Amount to heal (in half-hearts)
    # Set to -1 for FULL HEAL
    # Examples: 4 = 2 hearts, 10 = 5 hearts, 20 = 10 hearts, -1 = full health
    heal-amount: -1

    # ── REKIT ──
    # Give the killer a fresh kit on kill
    # This restores all items (potions, arrows, etc.)
    rekit-on-kill: true

    # ── EFFECTS ──
    # Clear all potion effects on kill
    # Useful to remove negative effects like poison/wither/slowness
    clear-effects-on-kill: true

    # ── SOUND ──
    # Play sound effect on kill
    play-sound: true

    # ── GOLDEN APPLES ──
    # Give golden apples on kill
    give-golden-apple: false
    # How many golden apples to give per kill
    golden-apples-amount: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # ARENA REGENERATION
  # Automatically regenerate arenas when they become empty
  # ─────────────────────────────────────────────────────────────────────────────
  regeneration:
    # Enable automatic regeneration
    enabled: true
    # Delay before regeneration starts after arena becomes empty (seconds)
    # This gives time for new players to join before regenerating
    delay-seconds: 5


#  █████╗ ██████╗ ███████╗███╗   ██╗ █████╗ ███████╗
# ██╔══██╗██╔══██╗██╔════╝████╗  ██║██╔══██╗██╔════╝
# ███████║██████╔╝█████╗  ██╔██╗ ██║███████║███████╗
# ██╔══██║██╔══██╗██╔══╝  ██║╚██╗██║██╔══██║╚════██║
# ██║  ██║██║  ██║███████╗██║ ╚████║██║  ██║███████║
# ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝╚═╝  ╚═══╝╚═╝  ╚═╝╚══════╝

arenas:
  # Arena schematic folder
  schematic-folder: "schematics"

  # Auto-regeneration settings
  regeneration:
    # Enable auto-regeneration after matches
    enabled: true
    # Use async pasting (FAWE)
    async: true
    # Delay before regeneration (ticks)
    delay: 20
    # Notify console on regeneration
    log-regeneration: true

  # Arena selection
  selection:
    # Random arena selection
    random: true
    # Allow players to choose arena
    allow-choice: true
    # Weight system (higher = more likely)
    use-weights: false

