world-restrictions:
  # ════════════════════════════════════════════════════════════════════════════
  # WORLD BLACKLIST SYSTEM
  # ════════════════════════════════════════════════════════════════════════════
  #
  # Controls where the plugin is active
  #
  # Modes:
  #   DISABLED  - Plugin works in ALL worlds (no restrictions)
  #   BLACKLIST - Plugin is COMPLETELY DISABLED in listed worlds
  #
  # When BLACKLIST mode is active:
  #   ✗ No commands work
  #   ✗ No lobby items are given
  #   ✗ No scoreboards are shown
  #   ✗ No duels can be started
  #   ✗ No queue joining
  #   ✗ No FFA access
  #   ✗ Plugin is completely invisible in those worlds
  # ════════════════════════════════════════════════════════════════════════════

  mode: "DISABLED"

  # Worlds where the plugin is COMPLETELY DISABLED
  # Add world names here to block ALL plugin features
  blacklist:
    - "creative"
    - "minigames"
    - "survival"
    - "skyblock"
    - "factions"
    - "prison"


