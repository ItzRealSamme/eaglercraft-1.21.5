health-display:
  # ════════════════════════════════════════════════════════════════════════════
  # HEALTH DISPLAY SYSTEM
  # ════════════════════════════════════════════════════════════════════════════
  #
  # Shows floating health indicators above players during combat
  # Uses modern TextDisplay entities for smooth, client-side rendering
  #
  # ════════════════════════════════════════════════════════════════════════════

  # Enable/disable the entire health display system
  # Set to false to completely disable health displays
  enabled: true

  # Display type: TEXT_DISPLAY (modern, smooth) or SCOREBOARD_TEAM (fallback)
  # Recommended: TEXT_DISPLAY for Paper 1.19.4+
  type: TEXT_DISPLAY

  # ─────────────────────────────────────────────────────────────────────────────
  # VISIBILITY SETTINGS
  # ─────────────────────────────────────────────────────────────────────────────

  # Show health displays in different game modes
  show-in-duels: true      # Show during 1v1/party duels
  show-in-ffa: true        # Show in FFA arenas
  show-to-spectators: true # Spectators can see health displays

  # ─────────────────────────────────────────────────────────────────────────────
  # DISPLAY FORMAT
  # ─────────────────────────────────────────────────────────────────────────────

  # Format: {current} = current health, {max} = max health, {percent} = percentage
  # Examples:
  #   "❤ {current}/{max}"           → ❤ 15/20
  #   "{current} HP"                → 15 HP
  #   "{percent}%"                  → 75%
  #   "♥ {current}"                 → ♥ 15
  format: "❤ {current}/{max}"

  # Heart symbol (can be customized to any unicode character)
  heart-symbol: "❤"

  # Show decimal values (false = whole numbers only)
  show-decimal: false
  decimal-places: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # POSITION & SCALE
  # ─────────────────────────────────────────────────────────────────────────────

  # Height above player head (in blocks)
  # Recommended: 2.3 for standing players
  height-offset: 2.3

  # Maximum view distance in blocks
  # Players further than this won't see the health display
  view-range: 32.0

  # Text scale (1.0 = normal size)
  # Smaller = harder to see, Larger = easier to read
  scale: 1.0

  # Background settings
  # 0.0 = invisible background, 1.0 = solid black background
  background-opacity: 0.0

  # ─────────────────────────────────────────────────────────────────────────────
  # COLOR THRESHOLDS
  # ─────────────────────────────────────────────────────────────────────────────

  # Colors based on health percentage
  # Uses hex colors for precise control
  colors:
    high: "#55FF55"        # 67-100% health (green)
    medium: "#FFFF55"      # 34-66% health (yellow)
    low: "#FF5555"         # 11-33% health (red)
    critical: "#8B0000"    # 0-10% health (dark red)

  # ─────────────────────────────────────────────────────────────────────────────
  # ANIMATION & EFFECTS
  # ─────────────────────────────────────────────────────────────────────────────

  # Smooth interpolation - display follows player smoothly
  # Recommended: true for smoother visuals
  smooth-interpolation: true

  # Interpolation duration in ticks
  # Lower = snappier movement, Higher = smoother movement
  # Recommended: 3 (smooth but responsive)
  interpolation-duration: 3

  # Visual effects
  pulse-on-low-health: true    # Pulse effect when health is critical
  fade-on-full-health: false   # Fade out when at full health
  fade-delay-seconds: 3        # Delay before fading (if enabled)

  # ─────────────────────────────────────────────────────────────────────────────
  # PERFORMANCE
  # ─────────────────────────────────────────────────────────────────────────────

  # How often to update display positions (in ticks)
  # Lower = smoother but more resource intensive
  # Higher = less smooth but better performance
  # Recommended: 1 (every tick) for smoothest experience
  update-interval-ticks: 1


# ███████╗███████╗████████╗████████╗██╗███╗   ██╗ ██████╗ ███████╗
# ██╔════╝██╔════╝╚══██╔══╝╚══██╔══╝██║████╗  ██║██╔════╝ ██╔════╝
