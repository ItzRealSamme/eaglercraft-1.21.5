party:
  # Party system enabled
  enabled: true

  # Maximum party size
  max-size: 10

  friendly-fire: false

  # Invite settings
  invites:
    # Invite expiry time (seconds)
    expiry-time: 60
    # Maximum pending invites
    max-pending: 10

  # Party vs Party settings
  party-vs-party:
    enabled: true
    # Require same party sizes
    require-same-size: true
    # Allow uneven parties (with warning)
    allow-uneven: false

  # Party Split settings (internal scrims)
  party-split:
    enabled: true
    # Available team sizes
    team-sizes:
      - 2  # 2v2
      - 3  # 3v3
      - 4  # 4v4
      - 5  # 5v5
    # Team colors
    team-colors:
      red: "&c"
      blue: "&9"

  # Party chat
  chat:
    enabled: true
    format: "&d[Party] &f{player}&7: &f{message}"
    prefix: "@"

# ███████╗ ██████╗ ██████╗ ██████╗ ███████╗██████╗  ██████╗  █████╗ ██████╗ ██████╗
# ██╔════╝██╔════╝██╔═══██╗██╔══██╗██╔════╝██╔══██╗██╔═══██╗██╔══██╗██╔══██╗██╔══██╗
