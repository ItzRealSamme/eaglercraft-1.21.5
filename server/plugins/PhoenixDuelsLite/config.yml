#                                                                         
# This is a configuration file that allows you to configure the PhoenixDuels plugin
# Website: https://www.phoenixplugins.com
# Discord: https://www.phoenixplugins.com/media/discord
#

join-reminder: true
notify-if-new-version: true
debug: false
performance:
  internal-pool-size: 5
worlds:
  should-use: DISABLED_WORLDS
  enabled: []
  disabled:
  - world_nether
allowed-types:
- UNRANKED
- RANKED
- CHALLENGE
match:
  default-finishing-seconds: 5
  extended-finishing-seconds: 60
  commands:
    mode: WHITELIST
    whitelist-commands: []
    blacklist-commands: []
  restore-last-inventory: true
  launch-fireworks-for-winner: true
  custom-nametags:
    enabled: true
    prefix: '%color%[%team%] '
betting:
  money-enabled: false
  items-enabled: false
items-betting:
  max-items-per-player: 10
cache:
  use-memory-for-performance: true
stats-update-interval: 60
commands:
  require-permission: false
  duel:
    enabled: true
    alternative: duel
  queue:
    enabled: true
    alternative: queue
  duelsettings:
    enabled: true
    alternative: duelsettings
  lostitems:
    enabled: true
    alternative: duellostitems
  toggleduelrequest:
    enabled: true
    alternative: toggleduelrequest
  kiteditor:
    enabled: true
    alternative: kiteditor
  stats:
    enabled: true
    alternative: stats
  spectate:
    enabled: true
    alternative: spectate
  party:
    enabled: true
    alternative: party
  leave:
    alternative: leave
invitation-expiration-time: 60
ranked:
  unranked-requirement:
    enabled: false
    amount: 10
    bypass-permission: phoenixduels.ranked.bypass
leaderboard-fetch-interval: 60
